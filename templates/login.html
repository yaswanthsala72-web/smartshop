{% extends 'base.html' %}
{% load static %}

{% block title %}Login - SmartShop{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-icon">
                    <i class="fas fa-sign-in-alt"></i>
                </div>
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Login to your SmartShop account</p>
            </div>
            <form method="POST" action="{% url 'login' %}?next={{ request.GET.next|default:'/' }}" class="auth-form" id="loginForm">
                {% csrf_token %}
                <div class="form-group">
                    <label for="login-username"><i class="fas fa-user"></i> Username</label>
                    <input type="text" name="username" class="form-input" placeholder="Enter your username" id="login-username" required>
                </div>
                <div class="form-group">
                    <label for="login-password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" name="password" class="form-input" placeholder="Enter your password" id="login-password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg btn-block" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            <div class="auth-footer">
                <p>Don't have an account? <a href="{% url 'register' %}" class="auth-link">Register here</a></p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
